<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ferro Alloys Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0B0F1A;
            --bg-2: #111827;
            --bg-3: #1A2236;
            --bg-4: #222D42;
            --border: rgba(255,255,255,0.08);
            --text-1: #F0F4FF;
            --text-2: #A8B4CC;
            --text-3: #6B7A99;
            --gold: #F5A623;
            --teal: #00D4AA;
            --r: 10px;
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-1); font-family: var(--font-main); min-height: 100vh; font-size: 13px; }

        /* --- HEADER --- */
        .header {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        /* --- FILTERS --- */
        .filter-bar {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px;
            margin: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-label { font-size: 10px; text-transform: uppercase; color: var(--text-3); font-weight: 700; }
        input, select {
            background: var(--bg-3);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
        }
        input:focus { border-color: var(--gold); }
        .btn-apply { background: var(--gold); color: #000; font-weight: 700; border: none; padding: 9px; border-radius: 6px; cursor: pointer; }

        /* --- KPI --- */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 0 20px 20px; }
        .kpi-card { background: var(--bg-2); border: 1px solid var(--border); padding: 16px; border-radius: var(--r); border-top: 3px solid var(--gold); }
        .kpi-val { font-family: var(--font-mono); font-size: 22px; font-weight: 600; margin: 4px 0; }
        
        /* --- TABLES --- */
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 20px; }
        @media (max-width: 800px) { .grid-half { grid-template-columns: 1fr; } }
        
        .table-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
        .table-title { background: var(--bg-3); padding: 10px 15px; font-weight: 700; font-size: 12px; border-bottom: 1px solid var(--border); }
        .scroll { overflow: auto; max-height: 300px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: var(--bg-4); color: var(--text-3); font-size: 10px; text-align: left; padding: 10px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
        .hl { color: var(--gold); font-weight: 600; }
        .num { text-align: right; font-family: var(--font-mono); }

        #loading { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading">Syncing SAP Data...</div>

<header class="header">
    <div>
        <div style="font-weight:700">⚙️ Ferro Alloys & Scrap</div>
        <div id="syncTime" style="font-size:10px; color:var(--text-3)">Connecting...</div>
    </div>
    <div style="color:var(--teal); font-size:10px; font-weight:700">● LIVE</div>
</header>

<div class="filter-bar">
    <div class="filter-group">
        <label class="filter-label">From Date</label>
        <input type="date" id="fDate">
    </div>
    <div class="filter-group">
        <label class="filter-label">To Date</label>
        <input type="date" id="tDate">
    </div>
    <div class="filter-group">
        <label class="filter-label">Product</label>
        <select id="fProd"><option value="ALL">All Products</option></select>
    </div>
    <div class="filter-group">
        <label class="filter-label">Supplier</label>
        <select id="fSupp"><option value="ALL">All Suppliers</option></select>
    </div>
    <button class="btn-apply" onclick="processData(allRawData)">APPLY FILTERS</button>
</div>

<div class="kpi-row">
    <div class="kpi-card"><div class="filter-label">Unrestricted</div><div class="kpi-val" id="kUn">0.00</div><div class="filter-label">MT</div></div>
    <div class="kpi-card"><div class="filter-label">Inspection</div><div class="kpi-val" id="kQi">0.00</div><div class="filter-label">MT</div></div>
    <div class="kpi-card"><div class="filter-label">Total Value</div><div class="kpi-val" id="kVa">₹ 0</div><div class="filter-label">Estimated</div></div>
    <div class="kpi-card"><div class="filter-label">SKUs</div><div class="kpi-val" id="kSk">0</div><div class="filter-label">Unique</div></div>
</div>

<div class="grid-half">
    <div class="table-card">
        <div class="table-title">Supplier Summary</div>
        <div class="scroll"><table><thead><tr><th>Name</th><th class="num">MT</th><th class="num">Value</th></tr></thead><tbody id="sBody"></tbody></table></div>
    </div>
    <div class="table-card">
        <div class="table-title">Grade Summary</div>
        <div class="scroll"><table><thead><tr><th>Product</th><th class="num">Unrest</th><th class="num">QI</th></tr></thead><tbody id="gBody"></tbody></table></div>
    </div>
</div>

<div class="table-card" style="margin: 20px;">
    <div class="table-title">Full Detailed Records</div>
    <div class="scroll" style="max-height: 500px;">
        <table>
            <thead><tr><th>Date</th><th>Product</th><th>Supplier</th><th class="num">Unrest (KG)</th><th class="num">QI (KG)</th><th class="num">Value</th></tr></thead>
            <tbody id="fBody"></tbody>
        </table>
    </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgxNmCByab9PpTPHgKmagg0o9Byf1kpbr-S58fI5PpGCt7Oauhxa-eJdKh3CDSLg/pub?gid=1079547348&single=true&output=csv';
let allRawData = [];

window.onload = () => {
    Papa.parse(SHEET_URL, {
        download: true, header: true, skipEmptyLines: true,
        complete: (res) => {
            allRawData = res.data;
            initFilters(res.data);
            processData(res.data);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('syncTime').textContent = 'Last Updated: ' + new Date().toLocaleTimeString();
        }
    });
};

function initFilters(data) {
    const prods = [...new Set(data.map(r => r.Product).filter(Boolean))].sort();
    const supps = [...new Set(data.map(r => r['Supplier Name']).filter(Boolean))].sort();
    const pSel = document.getElementById('fProd');
    const sSel = document.getElementById('fSupp');
    prods.forEach(p => pSel.add(new Option(p, p)));
    supps.forEach(s => sSel.add(new Option(s, s)));
}

function processData(data) {
    const fDate = document.getElementById('fDate').value;
    const tDate = document.getElementById('tDate').value;
    const fProd = document.getElementById('fProd').value;
    const fSupp = document.getElementById('fSupp').value;

    let tKG = 0, tQI = 0, tVal = 0;
    let sMap = {}, gMap = {}, skus = new Set();
    
    const sBody = document.getElementById('sBody');
    const gBody = document.getElementById('gBody');
    const fBody = document.getElementById('fBody');
    sBody.innerHTML = gBody.innerHTML = fBody.innerHTML = '';

    data.forEach(r => {
        const d = r['GRN Date'];
        const p = r['Product'];
        const s = r['Supplier Name'];
        const u = parseFloat(r['UnrestrictedStock'] || r['Unrestricted Stock']) || 0;
        const q = parseFloat(r['QualityInspection'] || r['Quality Inspection']) || 0;
        const v = parseFloat(r['Unrestricted Stock Value']) || 0;

        // Apply Filters
        if (fDate && d < fDate) return;
        if (tDate && d > tDate) return;
        if (fProd !== 'ALL' && p !== fProd) return;
        if (fSupp !== 'ALL' && s !== fSupp) return;
        if (u === 0 && q === 0) return;

        tKG += u; tQI += q; tVal += v;
        skus.add(p);

        if(!sMap[s]) sMap[s] = {w:0, v:0}; sMap[s].w += u; sMap[s].v += v;
        if(!gMap[p]) gMap[p] = {u:0, q:0}; gMap[p].u += u; gMap[p].q += q;

        fBody.innerHTML += `<tr><td>${d||'-'}</td><td class="hl">${p}</td><td>${s}</td><td class="num">${u.toLocaleString()}</td><td class="num">${q.toLocaleString()}</td><td class="num">₹${v.toLocaleString()}</td></tr>`;
    });

    // Update KPIs
    document.getElementById('kUn').textContent = (tKG/1000).toFixed(2);
    document.getElementById('kQi').textContent = (tQI/1000).toFixed(2);
    document.getElementById('kVa').textContent = '₹' + (tVal >= 10000000 ? (tVal/10000000).toFixed(2)+'Cr' : (tVal/100000).toFixed(2)+'L');
    document.getElementById('kSk').textContent = skus.size;

    // Summary Tables
    Object.entries(sMap).sort((a,b)=>b[1].w-a[1].w).forEach(([n, d]) => {
        sBody.innerHTML += `<tr><td class="hl">${n}</td><td class="num">${(d.w/1000).toFixed(2)}</td><td class="num">₹${(d.v/100000).toFixed(1)}L</td></tr>`;
    });
    Object.entries(gMap).sort((a,b)=>b[1].u-a[1].u).forEach(([n, d]) => {
        gBody.innerHTML += `<tr><td class="hl">${n}</td><td class="num">${(d.u/1000).toFixed(2)}</td><td class="num">${(d.q/1000).toFixed(2)}</td></tr>`;
    });
}
</script>
</body>
</html>
