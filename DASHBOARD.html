<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ferro Alloys & Scrap — Inventory Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0B0F1A;
            --bg-2: #111827;
            --bg-3: #1A2236;
            --bg-4: #222D42;
            --border: rgba(255,255,255,0.08);
            --text-1: #F0F4FF;
            --text-2: #A8B4CC;
            --text-3: #6B7A99;
            --gold: #F5A623;
            --gold-dim: rgba(245,166,35,0.15);
            --teal: #00D4AA;
            --r: 12px;
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text-1);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title { font-weight: 700; font-size: 1.1rem; }
        .header-sub { color: var(--text-3); font-size: 0.75rem; font-family: var(--font-mono); }

        /* --- KPI GRID --- */
        .main-container { padding: 20px; max-width: 1600px; margin: 0 auto; }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: var(--r);
            position: relative;
            transition: transform 0.2s ease;
        }

        .kpi-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .kpi-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-3); letter-spacing: 1px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--text-1); margin: 5px 0; font-family: var(--font-mono); }
        .kpi-unit { font-size: 0.7rem; color: var(--gold); font-weight: 600; }

        /* --- FILTERS --- */
        .filter-section {
            background: var(--bg-2);
            padding: 20px;
            border-radius: var(--r);
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border: 1px solid var(--border);
        }

        .filter-item label { display: block; font-size: 0.7rem; margin-bottom: 8px; color: var(--text-3); text-transform: uppercase; }
        .filter-item input, .filter-item select {
            width: 100%;
            background: var(--bg-3);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }

        .btn-apply {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            align-self: end;
        }

        /* --- TABLES --- */
        .table-container {
            background: var(--bg-2);
            border-radius: var(--r);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .table-header {
            padding: 15px 20px;
            background: var(--bg-3);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .scroll-x { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 12px 20px; background: var(--bg-3); font-size: 0.75rem; color: var(--text-3); text-transform: uppercase; }
        td { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .header { padding: 12px; flex-direction: column; align-items: flex-start; }
            .kpi-grid { grid-template-columns: 1fr; }
            .filter-section { grid-template-columns: 1fr; }
            .kpi-value { font-size: 1.5rem; }
        }

        /* Custom Status Pill */
        .live-indicator {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0, 212, 170, 0.1);
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.7rem; color: var(--teal); border: 1px solid var(--teal);
        }
        .dot { width: 8px; height: 8px; background: var(--teal); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header class="header">
    <div>
        <div class="header-title">Scrap</div>
        <div class="header-sub">Director Real-Time Inventory View</div>
    </div>
    <div class="live-indicator">
        <div class="dot"></div>
        LIVE SAP DATA
    </div>
</header>

<div class="main-container">
    
    <div class="filter-section">
        <div class="filter-item">
            <label>Start Date</label>
            <input type="date" id="dateFrom">
        </div>
        <div class="filter-item">
            <label>End Date</label>
            <input type="date" id="dateTo">
        </div>
        <div class="filter-item">
            <label>Product Grade</label>
            <select id="prodFilter"><option>All Products</option></select>
        </div>
        <button class="btn-apply" onclick="applyFilters()">UPDATE VIEW</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card" style="border-top: 4px solid var(--gold);">
            <div class="kpi-label">Unrestricted Stock</div>
            <div class="kpi-value" id="kpiUnrest">0.00</div>
            <div class="kpi-unit">METRIC TONNES</div>
        </div>
        <div class="kpi-card" style="border-top: 4px solid var(--teal);">
            <div class="kpi-label">Quality Inspection</div>
            <div class="kpi-value" id="kpiQI">0.00</div>
            <div class="kpi-unit">METRIC TONNES</div>
        </div>
        <div class="kpi-card" style="border-top: 4px solid #4D8EFF;">
            <div class="kpi-label">Current Inventory Value</div>
            <div class="kpi-value" id="kpiValue">₹ 0</div>
            <div class="kpi-unit">INR ESTIMATE</div>
        </div>
        <div class="kpi-card" style="border-top: 4px solid #A78BFA;">
            <div class="kpi-label">Active Suppliers</div>
            <div class="kpi-value" id="kpiSuppliers">0</div>
            <div class="kpi-unit">TOTAL UNIQUE</div>
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">📦 Batch Detailed Records</div>
        <div class="scroll-x">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Product</th>
                        <th>Supplier</th>
                        <th>Batch ID</th>
                        <th>Qty (KG)</th>
                        <th>Status</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Logic to handle the data fetching and rendering
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgxNmCByab9PpTPHgKmagg0o9Byf1kpbr-S58fI5MpGCt7Oauhxa-eJdKh3CDSLg/pub?gid=1079547348&single=true&output=csv';

    async function fetchData() {
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            complete: function(results) {
                renderDashboard(results.data);
            }
        });
    }

    function renderDashboard(data) {
        const tbody = document.getElementById('tableBody');
        let totalUnrest = 0;
        let totalQI = 0;
        let totalVal = 0;
        let suppliers = new Set();

        tbody.innerHTML = '';

        data.forEach(row => {
            const unrest = parseFloat(row['Unrestricted Stock']) || 0;
            const qi = parseFloat(row['Quality Inspection']) || 0;
            const value = parseFloat(row['Unrestricted Stock Value']) || 0;
            
            totalUnrest += unrest;
            totalQI += qi;
            totalVal += value;
            if(row['Supplier Name']) suppliers.add(row['Supplier Name']);

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row['GRN Date'] || '-'}</td>
                <td style="color:var(--gold); font-weight:600;">${row['Product'] || '-'}</td>
                <td>${row['Supplier Name'] || '-'}</td>
                <td style="font-family:var(--font-mono); font-size:0.7rem;">${row['Batch SID'] || '-'}</td>
                <td>${unrest.toLocaleString()}</td>
                <td><span style="color:${qi > 0 ? 'var(--teal)' : 'var(--text-3)'}">${qi > 0 ? 'In Review' : 'Ready'}</span></td>
                <td>₹${value.toLocaleString('en-IN')}</td>
            `;
            tbody.appendChild(tr);
        });

        // Update KPIs
        document.getElementById('kpiUnrest').innerText = (totalUnrest / 1000).toFixed(2);
        document.getElementById('kpiQI').innerText = (totalQI / 1000).toFixed(2);
        document.getElementById('kpiValue').innerText = '₹ ' + (totalVal / 10000000).toFixed(2) + ' Cr';
        document.getElementById('kpiSuppliers').innerText = suppliers.size;
    }

    function applyFilters() {
        // Simple refresh for now
        fetchData();
    }

    window.onload = fetchData;
</script>

</body>
</html>
